# ===================================================================
# DEV PROFILE
# Activate with:  mvnw.cmd spring-boot:run "-Dspring-boot.run.profiles=dev"
# or set:         SPRING_PROFILES_ACTIVE=dev
#
# Adds classpath:db/seed on top of the base migrations, so
# V2__seed_test_data.sql loads realistic Indian travel test data
# (2 tenants, 15 rows per table, all user passwords = Test@123).
# NEVER enable this location in production.
# ===================================================================
spring.flyway.locations=classpath:db/migration,classpath:db/seed