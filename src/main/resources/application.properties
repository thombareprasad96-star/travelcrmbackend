# ===================================================================
# APPLICATION CONFIGURATION
# ===================================================================
spring.application.name=travelcrm
server.port=8080

# ===================================================================
# POSTGRESQL DATABASE CONNECTION
# ===================================================================
spring.datasource.url=jdbc:postgresql://localhost:5432/travel_crm
spring.datasource.username=postgres
spring.datasource.password=Admin123
spring.datasource.driver-class-name=org.postgresql.Driver

# Connection Pool Settings
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.idle-timeout=30000
spring.datasource.hikari.pool-name=TravelCRMHikariPool
spring.datasource.hikari.max-lifetime=2000000
spring.datasource.hikari.connection-timeout=30000

# ===================================================================
# JPA / HIBERNATE PROPERTIES
# ===================================================================
# Schema is auto-managed by Hibernate. Note: `update` only ADDS columns and
# tables — it never tightens constraints or drops anything. Switch to
# migration-based management + `validate` before production.
spring.jpa.hibernate.ddl-auto=create

spring.jpa.open-in-view=false
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.use_sql_comments=true

