# ===================================================================
# JPA / HIBERNATE PROPERTIES
# ===================================================================
# Schema is auto-managed by Hibernate. Note: `update` only ADDS columns and
# tables — it never tightens constraints or drops anything. Switch to
# migration-based management + `validate` before production.
spring.jpa.hibernate.ddl-auto=update

spring.jpa.open-in-view=false

# ===================================================================
# DEV DATA SEEDER (dev only — set to false in production)
# Inserts 5 demo rows into each major table on startup, idempotently
# (only when a table is empty), under one demo tenant. See DevDataSeeder.
# ===================================================================
app.seed.enabled=true

# show-sql disabled: SQL is now logged via logback (see HIBERNATE DEBUG LOGGING
# below). Keeping both ON would print every query twice.
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.use_sql_comments=true

# Batch any lazy ToMany/ToOne loads (e.g. lead itinerary/services) into grouped
# IN (?,?,...) selects instead of one query per parent — backstops @BatchSize.
spring.jpa.properties.hibernate.default_batch_fetch_size=100

# Supplementary DDL/DML (partial-unique indexes, logical-FK indexes, legacy data
# normalization) in db/indexes.sql. defer-datasource-initialization=true makes it
# run AFTER Hibernate creates/updates the schema. continue-on-error tolerates a
# pre-existing data conflict in dev without bricking startup (statements are idempotent).
spring.sql.init.mode=always
spring.sql.init.schema-locations=classpath:db/indexes.sql
spring.sql.init.continue-on-error=true
spring.jpa.defer-datasource-initialization=true

# ===================================================================
# HIBERNATE DEBUG LOGGING  (dev only — turn off in prod)
# ===================================================================
# Generated SQL statements. Kept at WARN by default — DEBUG here (plus bind=TRACE
# below) floods the request thread with formatted log I/O and noticeably slows
# list endpoints. Flip to DEBUG only while actively debugging a query.
logging.level.org.hibernate.SQL=WARN
# Actual values bound to the "?" placeholders  (Hibernate 6 / Spring Boot 3.x).
# VERY expensive — leave off unless you specifically need to see bound values.
#logging.level.org.hibernate.orm.jdbc.bind=TRACE

# --- Optional, uncomment when needed ---
# Values extracted from result sets (very verbose)
#logging.level.org.hibernate.orm.jdbc.extract=TRACE
# Transaction begin/commit/rollback — useful for TenantContext + @Transactional
#logging.level.org.springframework.transaction=DEBUG
#logging.level.org.springframework.orm.jpa=DEBUG
# Query counts + timings (catch N+1 / LazyInit issues)
#spring.jpa.properties.hibernate.generate_statistics=true
#logging.level.org.hibernate.stat=DEBUG

# ===================================================================
# APPLICATION DEBUG LOGGING  (dev only — set to INFO in prod)
# Verbose flow logs for the quotation module (create/update/version/snapshot/
# pdf/email/search). Applied on top of log4j2.xml via Spring Boot's logging
# overrides — same mechanism as the Hibernate levels above.
# ===================================================================
logging.level.com.crm.travelcrm.quotation=DEBUG

