# ===================================================================
# TRASH / RECYCLE BIN
# Soft-deleted records are retained for `retention-days`, then permanently
# (hard) purged by TrashPurgeScheduler. The purge is the ONLY place a hard
# delete happens. The job runs per-tenant (tenant isolation) on this cron.
# ===================================================================
app.trash.retention-days=90
# Daily at 02:30 (server time). 6-field Spring cron: sec min hour dom mon dow.
app.trash.purge-cron=0 30 2 * * *

# Quotation PDF template is rendered by a dedicated XML-mode engine in
# QuotationPdfService; disable Boot's auto Thymeleaf template-location check.
spring.thymeleaf.check-template-location=false

# ===================================================================
# TRAVELER PORTAL (customer-facing self-service)
# Travelers are a SEPARATE auth realm from staff: their JWT is signed with a
# DISTINCT key (portal.jwt.secret, never jwt.secret) and served by a dedicated
# SecurityFilterChain on /api/portal/**. A traveler token therefore fails
# signature validation on the staff chain and vice-versa — they can never cross.
# ===================================================================
portal.jwt.secret=A474IqgP7X82N9xh/cOLKZgwoEHlSMsuOCRHAW50Jmk=
# Short-lived (1h) — the portal is re-auth-friendly via OTP.
portal.jwt.expiry-ms=3600000
# OTP login uses the shared, plug-and-play otp module (app.otp.* below) — delivery channels are
# logging stubs until an SMS/WhatsApp/email provider bean is wired.
# Document-expiry reminders: fire at each of these day-thresholds before expiry; daily cron.
portal.document.expiry-reminder-days=60,30,7
portal.document.expiry-cron=0 0 8 * * *
# Allow passport/visa scans (default Spring cap is 1 MB). Service enforces a 10 MB per-file limit.
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=12MB

# ===================================================================
# OTP MODULE (shared, plug-and-play — com.crm.travelcrm.otp)
# Used by the traveler portal login today; reusable for any OTP flow.
# Default store is in-memory; default delivery channels log (stub).
# ===================================================================
app.otp.length=6
app.otp.ttl-seconds=300
app.otp.max-attempts=5
app.otp.resend-cooldown-seconds=60

# ===================================================================
# DISHA AI ASSISTANT (Spring AI + Ollama) — internal staff assistant
# -------------------------------------------------------------------
# ONE-TIME LOCAL SETUP:
#   1. Install Ollama (https://ollama.com); it serves on http://localhost:11434
#   2. Pull the models:
#        ollama pull qwen3:8b          # chat/agent  (Step A)
#        ollama pull nomic-embed-text  # embeddings  (Step B / RAG)
# The app boots fine even when Ollama is NOT running — chat calls simply return a
# friendly "AI unavailable" message until Ollama is up.
# ===================================================================
spring.ai.ollama.base-url=http://localhost:11434
spring.ai.ollama.chat.options.model=qwen3:8b
spring.ai.ollama.chat.options.temperature=0.2
spring.ai.ollama.embedding.options.model=nomic-embed-text
# Never auto-pull models during startup (keeps boot offline-safe).
spring.ai.ollama.init.pull-model-strategy=never

# Disha tunables (bound by DishaProperties)
disha.context-max-turns=10
# RAG (Step B) stays OFF until the pgvector extension is installed
# (CREATE EXTENSION vector) and a KnowledgeChunk ingestion has run.
disha.rag-enabled=false

# PgVector auto-config is excluded so the app boots even though the `vector`
# extension is not yet installed on this PostgreSQL 18 instance. Disha provides
# its own PgVectorStore bean, gated on disha.rag-enabled (Step B). To enable RAG:
#   1. install pgvector and run `CREATE EXTENSION vector;`
#   2. set disha.rag-enabled=true  and restart
spring.autoconfigure.exclude=org.springframework.ai.vectorstore.pgvector.autoconfigure.PgVectorStoreAutoConfiguration
# Used by Disha's own vector-store bean when RAG is enabled (768 dims = nomic-embed-text):
spring.ai.vectorstore.pgvector.dimensions=768
spring.ai.vectorstore.pgvector.index-type=HNSW
spring.ai.vectorstore.pgvector.distance-type=COSINE_DISTANCE