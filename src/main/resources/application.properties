# ===================================================================
# APPLICATION CONFIGURATION
# ===================================================================
spring.application.name=travelcrm
server.port=8080

# ===================================================================
# POSTGRESQL DATABASE CONNECTION
# ===================================================================
spring.datasource.url=jdbc:postgresql://localhost:5432/travel_crm
spring.datasource.username=postgres
spring.datasource.password=Admin123
spring.datasource.driver-class-name=org.postgresql.Driver

# Connection Pool Settings
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.idle-timeout=30000
spring.datasource.hikari.pool-name=TravelCRMHikariPool
spring.datasource.hikari.max-lifetime=2000000
spring.datasource.hikari.connection-timeout=30000

# ===================================================================
# JPA / HIBERNATE PROPERTIES
# ===================================================================
# Schema is managed by Flyway (src/main/resources/db/migration).
# Hibernate only validates that entities match the database.
spring.jpa.hibernate.ddl-auto=validate

# ===================================================================
# FLYWAY MIGRATIONS
# ===================================================================
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
# Existing databases (previously managed by ddl-auto=update) are baselined
# at version 1 so V1__create_all_tables.sql is skipped there but still runs
# on fresh/empty databases.
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=1

spring.jpa.open-in-view=false
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.use_sql_comments=true

